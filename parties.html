    <main>
        <h1>Schedule a Party</h1>
        <h2>Please fill out this form to schedule a party!</h2>
        <form action="thankyou.html" method="GET">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br> 
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br> 
            <label for="date">Preferred Date:</label><br>
            <input type="date" id="date" name="date" required><br><br>
            <label for="time">Preferred Time:</label><br>
            <input type="time" id="time" name="time" required><br><br>
            <label for="guests">Number of Guests:</label><br>
            <input type="number" id="guests" name="guests" min="1" required><br><br>  
            <div class="actions">
                <input type="reset">
                <input type="submit">
            </div>
            </form>
    </main>
